<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>InsideOut Virtual Assistants - Premium Global Talent</title>
    
    <!-- Wistia Video Optimization - Load First -->
    <link rel="preconnect" href="https://fast.wistia.com" crossorigin>
    <link rel="preconnect" href="https://embed-ssl.wistia.com" crossorigin>
    <link rel="dns-prefetch" href="https://fast.wistia.com">
    <link rel="dns-prefetch" href="https://embed-ssl.wistia.com">
    <link rel="dns-prefetch" href="https://embedwistia-a.akamaihd.net">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Typeform Embed Script - Deferred to load after VSL -->
    <script defer src="//embed.typeform.com/next/embed.js"></script>
  </head>

  <body>
    <!-- VSL loads immediately before React app -->
    <div id="vsl-container" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); display: flex; align-items: center; justify-content: center; padding: 1rem;">
      <div style="max-width: 900px; width: 100%; background: rgba(0,0,0,0.3); border-radius: 1rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); padding: 1rem;">
        <iframe 
          src="https://fast.wistia.net/embed/iframe/7pdcefp4vc?seo=true&videoFoam=true"
          title="VSL Video"
          allow="autoplay; fullscreen"
          allowfullscreen
          loading="eager"
          fetchpriority="high"
          style="width: 100%; aspect-ratio: 16/9; border: none; border-radius: 0.5rem;"
        ></iframe>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide VSL overlay once React app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          var vslContainer = document.getElementById('vsl-container');
          if (vslContainer) {
            vslContainer.style.display = 'none';
          }
        }, 100);
      });
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
