<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>InsideOut Virtual Assistants - Premium Global Talent</title>
    
    <!-- Wistia Preconnect for faster VSL loading -->
    <link rel="preconnect" href="https://fast.wistia.com" />
    <link rel="dns-prefetch" href="https://fast.wistia.com" />
    <link rel="preconnect" href="https://embedwistia-a.akamaihd.net" />
    <link rel="dns-prefetch" href="https://embedwistia-a.akamaihd.net" />
    
    <!-- Critical CSS for instant hero rendering -->
    <style>:root{--primary:#3b82f6;--primary-foreground:#F8F6F3;--background:oklch(0.98 0.005 85);--foreground:oklch(0.18 0.01 85)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:var(--primary);color:white;min-height:100vh}nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(29,64,175,0.95);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1)}.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6rem 1rem 4rem;text-align:center}.hero h1{font-size:clamp(2rem,5vw,4rem);font-weight:700;line-height:1.1;margin-bottom:1.5rem}.hero p{font-size:clamp(1rem,2vw,1.25rem);opacity:0.9;margin-bottom:3rem;max-width:48rem}.vsl-container{width:100%;max-width:56rem;margin:0 auto 3rem;aspect-ratio:16/9;border-radius:1rem;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}.vsl-container iframe{width:100%;height:100%;border:none}.stats{display:flex;gap:3rem;flex-wrap:wrap;justify-content:center;margin-top:3rem}.stat{text-align:center}.stat-value{font-size:2.5rem;font-weight:700;color:#D4AF37}.stat-label{font-size:0.875rem;opacity:0.8;margin-top:0.5rem}</style>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Typeform Embed Script - deferred to load after hero -->
    <script defer src="//embed.typeform.com/next/embed.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <!-- Main app JavaScript - deferred to allow hero to render first -->
    <script type="module" defer src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
